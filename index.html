<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>69 Thought</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0608;
      --surface: #130d0f;
      --surface2: #1e1418;
      --border: #2e1f24;
      --accent: #c9415a;
      --accent2: #e8a0b0;
      --accent3: #7c2d3e;
      --gold: #c9a96e;
      --text: #f0e6e9;
      --muted: #7a5d65;
      --radius: 14px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(201,65,90,0.15);
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(10,6,8,0.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      z-index: 200;
      height: 56px;
    }
    .badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 9px; color: var(--gold);
      background: rgba(201,169,110,0.07);
      border: 1px solid rgba(201,169,110,0.2);
      padding: 5px 12px; border-radius: 20px;
      letter-spacing: 1.5px; text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold);
      animation: pulse-gold 2.5s ease infinite;
      box-shadow: 0 0 6px var(--gold);
    }
    @keyframes pulse-gold { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── LOGOUT BUTTON ── */
    .btn-logout {
      display: flex; align-items: center; gap: 6px;
      background: rgba(201,65,90,0.1);
      border: 1px solid rgba(201,65,90,0.3);
      color: var(--accent2);
      padding: 7px 14px; border-radius: 8px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-logout:hover { background: rgba(201,65,90,0.2); border-color: var(--accent); color: var(--text); }

    .btn-mute {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .btn-mute:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
    .btn-mute.muted { background: rgba(201,65,90,0.15); border-color: rgba(201,65,90,0.35); }

    .btn-refresh-top {
      display: flex; align-items: center; gap: 6px;
      background: rgba(201,169,110,0.07);
      border: 1px solid rgba(201,169,110,0.2);
      color: var(--gold);
      padding: 7px 14px; border-radius: 8px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-refresh-top:hover { background: rgba(201,169,110,0.15); color: var(--text); }
    .btn-refresh-top:disabled { opacity: 0.4; cursor: not-allowed; }
    .refresh-spin { display: inline-block; }
    .btn-refresh-top:disabled .refresh-spin { animation: spin 0.8s linear infinite; }

    /* ── PASSWORD SCREEN ── */
    #passwordScreen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 24px;
      overflow: hidden;
      z-index: 300;
    }
    #bgCanvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .bg-layer {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 20% 30%, rgba(124,45,62,0.35) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(201,65,90,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 50% 50%, rgba(30,10,15,0.9) 0%, transparent 100%);
    }
    .silk {
      position: absolute; inset: -20%; width: 140%; height: 140%;
      z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(201,65,90,0.018) 60px, rgba(201,65,90,0.018) 61px),
      repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(201,169,110,0.012) 60px, rgba(201,169,110,0.012) 61px);
      animation: silkDrift 20s linear infinite;
    }
    @keyframes silkDrift { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(30px,30px) rotate(1deg)} }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(201,65,90,0.5), transparent 70%); top: -150px; left: -150px; animation: orb1move 12s ease-in-out infinite; }
    .orb2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(124,45,62,0.4), transparent 70%); bottom: -100px; right: -80px; animation: orb2move 15s ease-in-out infinite; }
    .orb3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(201,169,110,0.25), transparent 70%); top: 50%; left: 60%; animation: orb1move 18s ease-in-out infinite reverse; }
    @keyframes orb1move { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(40px,-50px) scale(1.1)} 70%{transform:translate(-25px,35px) scale(0.9)} }
    @keyframes orb2move { 0%,100%{transform:translate(0,0) scale(1)} 35%{transform:translate(-35px,45px) scale(1.08)} 65%{transform:translate(30px,-30px) scale(0.92)} }
    .petal { position: absolute; pointer-events: none; z-index: 1; font-size: 14px; opacity: 0; animation: petalFall linear infinite; user-select: none; }
    @keyframes petalFall { 0%{opacity:0;transform:translateY(-20px) rotate(0deg) scale(0.8)} 10%{opacity:0.6} 90%{opacity:0.3} 100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(1.2)} }

    .pw-content { position: relative; z-index: 2; width: 100%; max-width: 400px; text-align: center; }
    .pw-icon { font-size: 52px; display: block; margin-bottom: 20px; animation: iconReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) both 0.1s; filter: drop-shadow(0 0 28px rgba(201,65,90,0.7)) drop-shadow(0 0 60px rgba(201,65,90,0.3)); }
    @keyframes iconReveal { from{opacity:0;transform:scale(0.2) rotate(-20deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
    .pw-title { font-family: 'Playfair Display', serif; font-size: 38px; line-height: 1.15; margin-bottom: 10px; animation: fadeSlide 0.7s cubic-bezier(0.16,1,0.3,1) both 0.25s; letter-spacing: -0.5px; }
    .pw-title em { color: var(--accent); font-style: italic; text-shadow: 0 0 30px rgba(201,65,90,0.4); }
    .pw-tagline { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; animation: fadeSlide 0.7s cubic-bezier(0.16,1,0.3,1) both 0.35s; }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .pw-input-wrap { position: relative; margin-bottom: 16px; animation: fadeSlide 0.7s cubic-bezier(0.16,1,0.3,1) both 0.42s; }
    .pw-input-wrap input { width: 100%; background: rgba(19,13,15,0.9); border: 1px solid rgba(201,65,90,0.25); color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; padding: 16px 52px 16px 20px; border-radius: var(--radius); outline: none; transition: border-color 0.3s, box-shadow 0.3s; -webkit-appearance: none; letter-spacing: 2px; text-align: center; }
    .pw-input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,65,90,0.12), 0 0 30px rgba(201,65,90,0.12), inset 0 1px 0 rgba(201,65,90,0.1); }
    .pw-input-wrap input::placeholder { color: var(--muted); letter-spacing: 1px; font-size: 12px; }
    .pw-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 4px; line-height: 1; transition: color 0.2s; }
    .pw-toggle:hover { color: var(--accent2); }
    .pw-dots { display: flex; gap: 10px; justify-content: center; margin: 18px 0 26px; animation: fadeSlide 0.7s cubic-bezier(0.16,1,0.3,1) both 0.48s; }
    .pw-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid rgba(201,65,90,0.3); transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .pw-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.4); box-shadow: 0 0 10px rgba(201,65,90,0.7), 0 0 20px rgba(201,65,90,0.3); }
    .pw-dot.error { background: #ff6b6b; border-color: #ff6b6b; box-shadow: 0 0 10px rgba(255,107,107,0.7); }
    #pwError { text-align: center; color: var(--accent2); font-size: 10px; margin-bottom: 12px; min-height: 14px; letter-spacing: 0.5px; }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .btn-unlock { position: relative; width: 100%; padding: 0; border: none; background: none; cursor: pointer; animation: fadeSlide 0.7s cubic-bezier(0.16,1,0.3,1) both 0.54s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .btn-unlock-inner { position: relative; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 28px; border-radius: var(--radius); background: linear-gradient(135deg, #8b1a2e 0%, #c9415a 40%, #e05a74 60%, #8b1a2e 100%); background-size: 200% 100%; color: #fff; font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; letter-spacing: 0.5px; transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.3s ease; overflow: hidden; }
    .btn-unlock:hover .btn-unlock-inner { background-position: 100% 0; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(201,65,90,0.5), 0 0 60px rgba(201,65,90,0.2); }
    .btn-unlock:active .btn-unlock-inner { transform: scale(0.97) translateY(0); }
    .btn-unlock:disabled .btn-unlock-inner { opacity: 0.5; cursor: not-allowed; }
    .btn-unlock-inner::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent); transform: skewX(-20deg); animation: shimmer 3s ease infinite 1s; }
    @keyframes shimmer { 0%{left:-100%} 40%,100%{left:140%} }
    .btn-arrow { font-size: 18px; transition: transform 0.3s ease; }
    .btn-unlock:hover .btn-arrow { transform: translateX(4px); }
    .pw-divider { display: flex; align-items: center; gap: 12px; margin: 22px 0 0; animation: fadeSlide 0.7s cubic-bezier(0.16,1,0.3,1) both 0.6s; }
    .pw-divider::before, .pw-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,65,90,0.2), transparent); }
    .pw-divider span { font-size: 9px; color: var(--muted); letter-spacing: 2px; white-space: nowrap; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideOut { from{opacity:1;transform:translateY(0) scale(1)} to{opacity:0;transform:translateY(-30px) scale(0.97)} }

    /* ── REELS VIEWER ── */
    #reelsView {
      display: none;
      position: fixed;
      inset: 0;
      top: 56px;
      overflow: hidden;
      touch-action: pan-y;
    }

    /* Loading / error state */
    #reelsStatus {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 10;
      pointer-events: none;
    }
    .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #reelsStatusText { color: var(--muted); font-size: 12px; }

    /* Reel strip container */
    #reelStrip {
      position: absolute; inset: 0;
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      will-change: transform;
    }

    /* Individual reel slide */
    .reel-slide {
      position: absolute;
      left: 0; right: 0;
      height: calc(100vh - 56px);
      display: flex; align-items: center; justify-content: center;
      background: #000;
      overflow: hidden;
    }

    .reel-slide img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .reel-slide video {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Subtle gradient overlay top/bottom */
    .reel-slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 100px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
      pointer-events: none; z-index: 2;
    }
    .reel-slide::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 120px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      pointer-events: none; z-index: 2;
    }

    /* Progress bar strip on side */
    .reel-progress-strip {
      position: fixed;
      right: 6px;
      top: 50%; transform: translateY(-50%);
      width: 3px;
      display: flex; flex-direction: column; gap: 3px;
      z-index: 210;
      max-height: 200px;
      overflow: hidden;
    }
    .prog-dot {
      flex-shrink: 0;
      height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s, height 0.3s;
    }
    .prog-dot.active {
      background: var(--accent);
      height: 14px;
      box-shadow: 0 0 6px var(--accent);
    }

    /* Swipe hint */
    .swipe-hint {
      position: absolute;
      bottom: 70px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      pointer-events: none;
      animation: hintFade 3s ease forwards 1.5s;
    }
    @keyframes hintFade { 0%{opacity:1} 70%{opacity:0.8} 100%{opacity:0} }
    .swipe-hint-arrow { font-size: 22px; animation: bounceUp 1s ease infinite; }
    @keyframes bounceUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .swipe-hint-text { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; }

    /* Empty state */
    .empty-reel {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 40px;
    }
    .empty-reel .empty-icon { font-size: 48px; }
    .empty-reel p { font-size: 12px; color: var(--muted); line-height: 1.8; }

    /* Error box */
    .error-box { background: rgba(201,65,90,0.07); border: 1px solid rgba(201,65,90,0.25); color: var(--accent2); border-radius: var(--radius); padding: 14px 18px; font-size: 12px; line-height: 1.6; max-width: 320px; text-align: center; }

    @media (max-width:480px) { .pw-title{font-size:30px} header{padding:12px 16px} }
  </style>
</head>
<body>

<header>
  <div class="badge"><div class="badge-dot"></div>69 Thought</div>
  <div class="header-right" id="headerActions" style="display:none;">
    <button class="btn-mute" id="btnMute" onclick="toggleMute()">🔊</button>
    <button class="btn-refresh-top" id="btnRefreshTop" onclick="refreshMedia()">
      <span class="refresh-spin">↻</span> Refresh
    </button>
    <button class="btn-logout" onclick="resetApp()">↩ Logout</button>
  </div>
</header>

<!-- PASSWORD -->
<div id="passwordScreen">
  <canvas id="bgCanvas"></canvas>
  <div class="bg-layer"></div>
  <div class="silk"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="pw-content">
    <span class="pw-icon">🌹</span>
    <h1 class="pw-title">Welcome<br><em>darling.</em></h1>
    <p class="pw-tagline">Private access only</p>

    <div class="pw-input-wrap">
      <input type="password" id="pwInput" placeholder="enter your secret" autocomplete="off" oninput="onPwInput()" />
      <button class="pw-toggle" onclick="togglePwVisibility()" id="pwToggleBtn" type="button">👁</button>
    </div>

    <div class="pw-dots">
      <div class="pw-dot" id="d0"></div><div class="pw-dot" id="d1"></div>
      <div class="pw-dot" id="d2"></div><div class="pw-dot" id="d3"></div>
      <div class="pw-dot" id="d4"></div><div class="pw-dot" id="d5"></div>
      <div class="pw-dot" id="d6"></div><div class="pw-dot" id="d7"></div>
      <div class="pw-dot" id="d8"></div><div class="pw-dot" id="d9"></div>
    </div>

    <div id="pwError"></div>

    <button class="btn-unlock" id="btnUnlock" onclick="checkPassword()">
      <div class="btn-unlock-inner">
        Enter <span class="btn-arrow">→</span>
      </div>
    </button>

    <div class="pw-divider"><span>✦ private vault ✦</span></div>
  </div>
</div>

<!-- REELS VIEW -->
<div id="reelsView">
  <div id="reelsStatus">
    <div class="spinner"></div>
    <div id="reelsStatusText">Fetching from Telegram...</div>
  </div>
  <div id="reelStrip"></div>
  <div class="reel-progress-strip" id="progressStrip"></div>
</div>

<script>
  /* ── MUTE TOGGLE ── */
  let isMuted = false;
  function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById("btnMute");
    btn.textContent = isMuted ? "🔇" : "🔊";
    btn.classList.toggle("muted", isMuted);
    document.querySelectorAll(".reel-slide video").forEach(v => { v.muted = isMuted; });
  }

  /* ── PETAL RAIN ── */
  const petals = ["🌹","🌸","✿","❀","🌺"];
  function spawnPetal() {
    const el = document.createElement("div");
    el.className = "petal";
    el.textContent = petals[Math.floor(Math.random() * petals.length)];
    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (10 + Math.random() * 10) + "px";
    const dur = 8 + Math.random() * 10;
    el.style.animationDuration = dur + "s";
    el.style.animationDelay = (Math.random() * 4) + "s";
    el.style.opacity = 0;
    document.getElementById("passwordScreen").appendChild(el);
    setTimeout(() => el.remove(), (dur + 4) * 1000);
  }
  for (let i = 0; i < 12; i++) setTimeout(spawnPetal, i * 600);
  setInterval(spawnPetal, 1800);

  /* ── PARTICLE CANVAS ── */
  const canvas = document.getElementById("bgCanvas");
  const ctx = canvas.getContext("2d");
  let particles = [];

  function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.r = 0.5 + Math.random() * 1.5;
      this.alpha = 0;
      this.maxAlpha = 0.2 + Math.random() * 0.4;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = -0.2 - Math.random() * 0.4;
      this.life = 0;
      this.maxLife = 120 + Math.random() * 180;
      this.color = Math.random() > 0.5 ? `rgba(201,65,90,${this.maxAlpha})` : `rgba(201,169,110,${this.maxAlpha * 0.5})`;
    }
    update() {
      this.life++;
      const t = this.life / this.maxLife;
      this.alpha = t < 0.2 ? (t / 0.2) * this.maxAlpha : t > 0.8 ? ((1-t)/0.2) * this.maxAlpha : this.maxAlpha;
      this.x += this.vx; this.y += this.vy;
      if (this.life >= this.maxLife) this.reset();
    }
    draw() {
      ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
      ctx.shadowBlur = 6; ctx.shadowColor = this.color;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill(); ctx.restore();
    }
  }
  for (let i = 0; i < 60; i++) { const p = new Particle(); p.life = Math.floor(Math.random() * p.maxLife); particles.push(p); }
  function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
  animateParticles();

  /* ── PASSWORD LOGIC ── */
  const API = "/api/telegram";
  let sessionPassword = "";

  function onPwInput() {
    const val = document.getElementById("pwInput").value;
    for (let i = 0; i < 10; i++) document.getElementById("d" + i).classList.toggle("filled", i < val.length);
    document.getElementById("pwError").textContent = "";
  }
  function togglePwVisibility() {
    const inp = document.getElementById("pwInput"), btn = document.getElementById("pwToggleBtn");
    inp.type = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "👁" : "🙈";
  }
  async function checkPassword() {
    const val = document.getElementById("pwInput").value;
    const errEl = document.getElementById("pwError");
    const btn = document.getElementById("btnUnlock");
    if (!val) return;
    btn.disabled = true;
    btn.querySelector(".btn-unlock-inner").textContent = "Verifying...";
    try {
      const res = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "verify", password: val }) });
      const data = await res.json();
      if (res.ok && data.ok) {
        sessionPassword = val;
        const ps = document.getElementById("passwordScreen");
        ps.style.animation = "slideOut 0.45s cubic-bezier(0.4,0,1,1) both";
        setTimeout(() => { ps.style.display = "none"; initReels(); }, 420);
      } else {
        showWrongPassword(errEl);
        btn.disabled = false;
        btn.querySelector(".btn-unlock-inner").innerHTML = 'Enter <span class="btn-arrow">→</span>';
      }
    } catch (e) {
      errEl.textContent = "Network error — is the site live on Vercel?";
      btn.disabled = false;
      btn.querySelector(".btn-unlock-inner").innerHTML = 'Enter <span class="btn-arrow">→</span>';
    }
  }
  function showWrongPassword(errEl) {
    document.getElementById("pwInput").value = "";
    onPwInput();
    errEl.textContent = "Incorrect password. Try again.";
    errEl.classList.remove("shake"); void errEl.offsetWidth; errEl.classList.add("shake");
    document.querySelectorAll(".pw-dot").forEach(d => { d.classList.remove("filled"); d.classList.add("error"); setTimeout(() => d.classList.remove("error"), 700); });
  }
  async function api(action, extra = {}) {
    const res = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action, password: sessionPassword, ...extra }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Server error");
    return data;
  }

  /* ── REELS ENGINE ── */
  let allMedia = [];
  let currentIndex = 0;
  let slideHeight = 0;

  async function initReels() {
    document.getElementById("reelsView").style.display = "block";
    document.getElementById("headerActions").style.display = "flex";
    await loadMedia();
  }

  async function refreshMedia() {
    const btn = document.getElementById("btnRefreshTop");
    btn.disabled = true;
    btn.innerHTML = '<span class="refresh-spin">↻</span> Fetching...';
    document.getElementById("reelStrip").innerHTML = "";
    document.getElementById("progressStrip").innerHTML = "";
    document.getElementById("reelsStatus").style.display = "flex";
    document.getElementById("reelsStatusText").textContent = "Fetching from Telegram...";
    allMedia = [];
    currentIndex = 0;
    await loadMedia();
    btn.disabled = false;
    btn.innerHTML = '<span class="refresh-spin">↻</span> Refresh';
  }

  async function loadMedia() {
    try {
      const { posts } = await api("getUpdates");
      if (!posts || posts.length === 0) {
        document.getElementById("reelsStatus").innerHTML = `
          <div class="empty-reel">
            <div class="empty-icon">📭</div>
            <p>No media found. Make sure your bot is an <strong>Admin</strong><br>in the channel, send a photo/video, then reload.</p>
          </div>`;
        return;
      }

      document.getElementById("reelsStatusText").textContent = `Loading ${posts.length} items...`;

      const mediaItems = [];
      for (const post of posts) {
        try {
          const { url } = await api("getFileUrl", { file_id: post.file_id });
          if (url) mediaItems.push({ type: post.type, url, date: post.date });
        } catch { /* skip */ }
      }

      allMedia = mediaItems.reverse();
      currentIndex = 0;
      document.getElementById("reelsStatus").style.display = "none";
      buildReelSlides();
    } catch (err) {
      document.getElementById("reelsStatus").innerHTML = `<div class="empty-reel"><div class="error-box">Error: ${err.message}</div></div>`;
    }
  }

  function buildReelSlides() {
    const strip = document.getElementById("reelStrip");
    strip.innerHTML = "";
    slideHeight = window.innerHeight - 56;

    allMedia.forEach((item, i) => {
      const slide = document.createElement("div");
      slide.className = "reel-slide";
      slide.style.top = (i * slideHeight) + "px";

      const isVideo = item.type === "video";

      if (isVideo) {
        const vid = document.createElement("video");
        vid.src = item.url;
        vid.loop = true;
        vid.playsInline = true;
        vid.muted = isMuted;
        vid.preload = "metadata";
        vid.controls = false;
        slide.appendChild(vid);
      } else {
        const img = document.createElement("img");
        img.src = item.url;
        img.loading = i < 3 ? "eager" : "lazy";
        img.alt = "";
        slide.appendChild(img);
      }

      strip.appendChild(slide);
    });

    // Add swipe hint on first slide
    const hint = document.createElement("div");
    hint.className = "swipe-hint";
    hint.style.position = "fixed";
    hint.style.bottom = "70px";
    hint.style.left = "50%";
    hint.style.transform = "translateX(-50%)";
    hint.style.zIndex = "15";
    hint.innerHTML = '<div class="swipe-hint-arrow">↑</div><div class="swipe-hint-text">Swipe up</div>';
    document.getElementById("reelsView").appendChild(hint);
    setTimeout(() => hint.remove(), 5000);

    buildProgressStrip();
    goToSlide(0, false);
    setupSwipe();

    window.addEventListener("resize", () => {
      slideHeight = window.innerHeight - 56;
      document.querySelectorAll(".reel-slide").forEach((s, i) => { s.style.top = (i * slideHeight) + "px"; });
      goToSlide(currentIndex, false);
    });
  }

  function buildProgressStrip() {
    const strip = document.getElementById("progressStrip");
    strip.innerHTML = "";
    const count = Math.min(allMedia.length, 20);
    for (let i = 0; i < count; i++) {
      const dot = document.createElement("div");
      dot.className = "prog-dot";
      dot.id = "pdot-" + i;
      strip.appendChild(dot);
    }
  }

  function updateProgressStrip() {
    const count = Math.min(allMedia.length, 20);
    const dotIdx = Math.round((currentIndex / Math.max(allMedia.length - 1, 1)) * (count - 1));
    for (let i = 0; i < count; i++) {
      const dot = document.getElementById("pdot-" + i);
      if (dot) dot.classList.toggle("active", i === dotIdx);
    }
  }

  function goToSlide(index, animate = true) {
    if (index < 0 || index >= allMedia.length) return;

    const prevSlide = document.querySelectorAll(".reel-slide")[currentIndex];
    if (prevSlide) {
      const prevVid = prevSlide.querySelector("video");
      if (prevVid) prevVid.pause();
    }

    currentIndex = index;
    slideHeight = window.innerHeight - 56;

    const strip = document.getElementById("reelStrip");
    strip.style.transition = animate ? "transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)" : "none";
    strip.style.transform = `translateY(${-currentIndex * slideHeight}px)`;

    const curSlide = document.querySelectorAll(".reel-slide")[currentIndex];
    if (curSlide) {
      const curVid = curSlide.querySelector("video");
      if (curVid) {
        curVid.currentTime = 0;
        curVid.play().catch(() => {});
      }
    }

    updateProgressStrip();
  }

  /* Touch / Mouse swipe handling */
  function setupSwipe() {
    const view = document.getElementById("reelsView");
    let startY = 0, startX = 0, isDragging = false, lastDelta = 0;

    view.addEventListener("touchstart", e => {
      startY = e.touches[0].clientY;
      startX = e.touches[0].clientX;
      isDragging = true;
      lastDelta = 0;
      document.getElementById("reelStrip").style.transition = "none";
    }, { passive: true });

    view.addEventListener("touchmove", e => {
      if (!isDragging) return;
      const dy = e.touches[0].clientY - startY;
      const dx = e.touches[0].clientX - startX;
      if (Math.abs(dx) > Math.abs(dy) + 10) { isDragging = false; return; }
      lastDelta = dy;
      const baseOffset = -currentIndex * slideHeight;
      document.getElementById("reelStrip").style.transform = `translateY(${baseOffset + dy * 0.4}px)`;
    }, { passive: true });

    view.addEventListener("touchend", e => {
      if (!isDragging) return;
      isDragging = false;
      if (lastDelta < -60) goToSlide(currentIndex + 1);
      else if (lastDelta > 60) goToSlide(currentIndex - 1);
      else goToSlide(currentIndex);
    }, { passive: true });

    let wheelCooldown = false;
    view.addEventListener("wheel", e => {
      if (wheelCooldown) return;
      e.preventDefault();
      wheelCooldown = true;
      if (e.deltaY > 30) goToSlide(currentIndex + 1);
      else if (e.deltaY < -30) goToSlide(currentIndex - 1);
      setTimeout(() => { wheelCooldown = false; }, 600);
    }, { passive: false });

    document.addEventListener("keydown", e => {
      if (document.getElementById("reelsView").style.display === "none") return;
      if (e.key === "ArrowDown" || e.key === "ArrowRight") goToSlide(currentIndex + 1);
      if (e.key === "ArrowUp" || e.key === "ArrowLeft") goToSlide(currentIndex - 1);
    });
  }

  function resetApp() {
    document.querySelectorAll(".reel-slide video").forEach(v => v.pause());

    allMedia = [];
    sessionPassword = "";
    currentIndex = 0;

    document.getElementById("reelStrip").innerHTML = "";
    document.getElementById("progressStrip").innerHTML = "";
    document.getElementById("reelsStatus").style.display = "flex";
    document.getElementById("reelsStatusText").textContent = "Fetching from Telegram...";
    document.getElementById("reelsView").style.display = "none";
    document.getElementById("headerActions").style.display = "none";

    const ps = document.getElementById("passwordScreen");
    ps.style.display = "flex";
    ps.style.animation = "fadeUp 0.5s ease both";
    document.getElementById("pwInput").value = "";
    onPwInput();
  }

  document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });
</script>
</body>
</html>
