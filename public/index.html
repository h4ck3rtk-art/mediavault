<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Telegram Media Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e; --surface: #141416; --surface2: #1c1c1f;
      --border: #2a2a2f; --accent: #5b8dee; --accent2: #e85d8a;
      --text: #e8e8ec; --muted: #6b6b75; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    /* HEADER */
    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(12,12,14,0.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); z-index: 100; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 20px; }
    .logo span { color: var(--accent); }
    .secure-badge { display: flex; align-items: center; gap: 5px; font-size: 9px; color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.8px; text-transform: uppercase; }
    .secure-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* PASSWORD SCREEN */
    #passwordScreen { max-width: 420px; margin: 60px auto; padding: 0 24px; animation: fadeUp 0.5s ease both; }
    .pw-icon { font-size: 42px; margin-bottom: 20px; display: block; }
    .pw-title { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1.1; margin-bottom: 10px; }
    .pw-title em { color: var(--accent); font-style: italic; }
    .pw-sub { color: var(--muted); font-size: 12px; margin-bottom: 32px; line-height: 1.7; }
    .pw-input-wrap { position: relative; margin-bottom: 14px; }
    .pw-input-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 15px 48px 15px 18px; border-radius: var(--radius); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .pw-input-wrap input:focus { border-color: var(--accent); }
    .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; line-height: 1; }
    .pw-dots { display: flex; gap: 8px; justify-content: center; margin: 14px 0 20px; }
    .pw-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); transition: background 0.15s, border-color 0.15s, transform 0.15s; }
    .pw-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.2); }
    .pw-dot.error  { background: var(--accent2); border-color: var(--accent2); }
    #pwError { text-align: center; color: var(--accent2); font-size: 11px; margin-bottom: 10px; min-height: 16px; }
    .shake { animation: shake 0.35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .btn-primary { width: 100%; margin-top: 4px; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* GALLERY */
    #gallery { display: none; padding: 24px 16px; }
    .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
    .gallery-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .gallery-title span { color: var(--muted); font-size: 13px; font-family: 'DM Mono', monospace; margin-left: 8px; }
    .btn-reset { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 9px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: color 0.2s, border-color 0.2s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .btn-reset:hover { color: var(--text); border-color: var(--muted); }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* GRID */
    .grid { columns: 2 140px; gap: 10px; }
    .media-card { break-inside: avoid; margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; background: var(--surface); border: 1px solid var(--border); position: relative; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.4s ease both; -webkit-tap-highlight-color: transparent; }
    .media-card:active { transform: scale(0.97); }
    @media (hover:hover) { .media-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); } }
    .media-card img   { width: 100%; display: block; object-fit: cover; }
    .media-card video { width: 100%; display: block; max-height: 300px; object-fit: cover; }
    .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 12px 12px; background: linear-gradient(transparent,rgba(0,0,0,0.8)); opacity: 0; transition: opacity 0.2s; }
    @media (hover:none) { .card-overlay { opacity: 1; } }
    .media-card:hover .card-overlay { opacity: 1; }
    .card-date { font-size: 9px; color: rgba(255,255,255,0.7); }
    .card-type { display: inline-block; font-size: 8px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 6px; border-radius: 4px; margin-bottom: 3px; }
    .type-photo { background: rgba(91,141,238,0.3); color: var(--accent); }
    .type-video { background: rgba(232,93,138,0.3); color: var(--accent2); }
    .video-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.75); border-radius: 6px; padding: 3px 8px; font-size: 8px; color: #fff; letter-spacing: 0.5px; }

    /* LIGHTBOX */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; padding: 16px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    #lightbox.open { display: flex; }
    .lb-content { max-width: 100%; max-height: 100%; }
    .lb-content img, .lb-content video { max-width: calc(100vw - 32px); max-height: calc(100vh - 80px); border-radius: var(--radius); display: block; object-fit: contain; }
    .lb-close { position: fixed; top: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; -webkit-tap-highlight-color: transparent; z-index: 1000; }
    .lb-close:hover { background: var(--border); }

    /* STATES */
    #status { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
    .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 12px; line-height: 1.7; }
    .error-box { background: rgba(232,93,138,0.07); border: 1px solid rgba(232,93,138,0.25); color: var(--accent2); border-radius: var(--radius); padding: 14px 18px; font-size: 12px; margin-top: 16px; line-height: 1.6; }

    /* RESPONSIVE */
    @media (max-width:480px) { .pw-title{font-size:26px} header{padding:14px 16px} .logo{font-size:17px} #passwordScreen{margin-top:40px} }
    @media (min-width:600px)  { .grid{columns:3 160px;gap:12px} }
    @media (min-width:900px)  { #gallery{padding:32px 40px} .grid{columns:4 200px;gap:14px} .gallery-title{font-size:26px} }
    @media (min-width:1200px) { .grid{columns:5 220px} }
  </style>
</head>
<body>

<header>
  <div class="logo">Media<span>Vault</span></div>
  <div class="secure-badge"><div class="secure-dot"></div>Secured via Vercel</div>
</header>

<!-- PASSWORD -->
<div id="passwordScreen">
  <span class="pw-icon">🔐</span>
  <h1 class="pw-title">Enter your<br><em>access code.</em></h1>
  <p class="pw-sub">Password is verified on the server. No secrets exist in this page's source code.</p>
  <div class="pw-input-wrap">
    <input type="password" id="pwInput" placeholder="Enter password" autocomplete="off" oninput="onPwInput()" />
    <button class="pw-toggle" onclick="togglePwVisibility()" id="pwToggleBtn" type="button">👁</button>
  </div>
  <div class="pw-dots">
    <div class="pw-dot" id="d0"></div><div class="pw-dot" id="d1"></div>
    <div class="pw-dot" id="d2"></div><div class="pw-dot" id="d3"></div>
    <div class="pw-dot" id="d4"></div><div class="pw-dot" id="d5"></div>
    <div class="pw-dot" id="d6"></div><div class="pw-dot" id="d7"></div>
    <div class="pw-dot" id="d8"></div><div class="pw-dot" id="d9"></div>
  </div>
  <div id="pwError"></div>
  <button class="btn-primary" id="btnUnlock" onclick="checkPassword()">Unlock →</button>
</div>

<!-- GALLERY -->
<div id="gallery">
  <div class="gallery-header">
    <div class="gallery-title">Media Gallery<span id="mediaCount"></span></div>
    <button class="btn-reset" onclick="resetApp()">🔒 Lock</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterMedia('all',this)">All</button>
    <button class="filter-btn" onclick="filterMedia('photo',this)">Photos</button>
    <button class="filter-btn" onclick="filterMedia('video',this)">Videos</button>
  </div>
  <div id="status"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-content" id="lbContent"></div>
</div>

<script>
  // ✅ Zero secrets here — all validated server-side by /api/telegram
  const API = "/api/telegram";
  let allMedia = [], sessionPassword = "";

  function onPwInput() {
    const val = document.getElementById("pwInput").value;
    for (let i = 0; i < 10; i++)
      document.getElementById("d" + i).classList.toggle("filled", i < val.length);
    document.getElementById("pwError").textContent = "";
  }

  function togglePwVisibility() {
    const inp = document.getElementById("pwInput");
    const btn = document.getElementById("pwToggleBtn");
    inp.type = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "👁" : "🙈";
  }

  async function checkPassword() {
    const val   = document.getElementById("pwInput").value;
    const errEl = document.getElementById("pwError");
    const btn   = document.getElementById("btnUnlock");
    if (!val) return;

    btn.disabled = true;
    btn.textContent = "Verifying...";

    try {
      const res  = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "verify", password: val })
      });
      const data = await res.json();

      if (res.ok && data.ok) {
        sessionPassword = val;
        document.getElementById("passwordScreen").style.display = "none";
        loadMedia();
      } else {
        showWrongPassword(errEl);
      }
    } catch (e) {
      errEl.textContent = "Network error — is the site live on Vercel?";
    }

    btn.disabled = false;
    btn.textContent = "Unlock →";
  }

  function showWrongPassword(errEl) {
    document.getElementById("pwInput").value = "";
    onPwInput();
    errEl.textContent = "Incorrect password. Try again.";
    errEl.classList.remove("shake");
    void errEl.offsetWidth;
    errEl.classList.add("shake");
    document.querySelectorAll(".pw-dot").forEach(d => {
      d.classList.remove("filled");
      d.classList.add("error");
      setTimeout(() => d.classList.remove("error"), 600);
    });
  }

  async function api(action, extra = {}) {
    const res  = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, password: sessionPassword, ...extra })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Server error");
    return data;
  }

  async function loadMedia() {
    document.getElementById("gallery").style.display = "block";
    document.getElementById("status").innerHTML = '<div class="spinner"></div>Fetching updates from Telegram...';
    document.getElementById("grid").innerHTML = "";
    document.getElementById("mediaCount").textContent = "";

    try {
      const { posts } = await api("getUpdates");

      if (!posts || posts.length === 0) {
        document.getElementById("status").innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>No media found. Make sure your bot is an <strong>Admin</strong><br>
            in the channel, send a photo/video, then reload.</p>
          </div>`;
        return;
      }

      document.getElementById("status").innerHTML = `<div class="spinner"></div>Loading ${posts.length} items...`;

      const mediaItems = [];
      for (const post of posts) {
        try {
          const { url } = await api("getFileUrl", { file_id: post.file_id });
          if (url) mediaItems.push({ type: post.type, url, date: post.date });
        } catch { /* skip broken */ }
      }

      allMedia = mediaItems.reverse();
      renderGrid(allMedia);
      document.getElementById("mediaCount").textContent = `— ${allMedia.length} item${allMedia.length !== 1 ? "s" : ""}`;
      document.getElementById("status").innerHTML = "";

    } catch (err) {
      document.getElementById("status").innerHTML = `<div class="error-box">Error: ${err.message}</div>`;
    }
  }

  function renderGrid(items) {
    const grid = document.getElementById("grid");
    if (!items.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>No media matches this filter.</p></div>';
      return;
    }
    grid.innerHTML = items.map((item, i) => {
      const date  = new Date(item.date * 1000).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
      const delay = Math.min(i * 0.05, 0.8);
      return item.type === "photo" ? `
        <div class="media-card" style="animation-delay:${delay}s" onclick="openLightbox('photo','${item.url}')">
          <img src="${item.url}" loading="lazy" alt="photo" />
          <div class="card-overlay"><div class="card-type type-photo">Photo</div><div class="card-date">${date}</div></div>
        </div>` : `
        <div class="media-card" style="animation-delay:${delay}s" onclick="openLightbox('video','${item.url}')">
          <video src="${item.url}" muted preload="metadata" playsinline></video>
          <div class="video-badge">▶ VIDEO</div>
          <div class="card-overlay"><div class="card-type type-video">Video</div><div class="card-date">${date}</div></div>
        </div>`;
    }).join("");
  }

  function filterMedia(type, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderGrid(type === "all" ? allMedia : allMedia.filter(m => m.type === type));
  }

  function openLightbox(type, url) {
    document.getElementById("lbContent").innerHTML = type === "photo"
      ? `<img src="${url}" alt="photo" />`
      : `<video src="${url}" controls autoplay playsinline></video>`;
    document.getElementById("lightbox").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.getElementById("lbContent").innerHTML = "";
    document.body.style.overflow = "";
  }

  function resetApp() {
    allMedia = []; sessionPassword = "";
    document.getElementById("grid").innerHTML = "";
    document.getElementById("status").innerHTML = "";
    document.getElementById("gallery").style.display = "none";
    document.getElementById("passwordScreen").style.display = "block";
    document.getElementById("pwInput").value = "";
    onPwInput();
  }

  document.getElementById("lightbox").addEventListener("click", e => { if (e.target === e.currentTarget) closeLightbox(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
  document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });

  let ty = 0;
  document.getElementById("lightbox").addEventListener("touchstart", e => { ty = e.touches[0].clientY; }, { passive: true });
  document.getElementById("lightbox").addEventListener("touchend",   e => { if (e.changedTouches[0].clientY - ty > 80) closeLightbox(); }, { passive: true });
</script>
</body>
</html>
